[build]
  command = "cd frontend && npm install && npm run build"
  publish = "frontend/dist"

[dev]
  command = "npm --prefix frontend run dev"
  targetPort = 5173
  port = 8888

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/ranking"
  to = "/.netlify/functions/ranking"
  status = 200
  force = true